<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Activity Submission</title>
    <style>
        :root { 
            --teal: #00b08b; 
            --coral: #ff7e79; 
            --purple: #7a6fff; 
            --white: #ffffff; 
        }
        
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #b0b0b0; 
            overflow: hidden; 
        }
        
        .hidden { display: none !important; }

        /* NAME INPUT SCREEN */
        #name-input-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        
        .name-modal { 
            background: white; 
            padding: 50px; 
            border-radius: 30px; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            text-align: center;
        }
        
        .name-modal h1 {
            color: var(--teal);
            margin-top: 0;
            font-size: 2rem;
        }
        
        .name-modal p {
            color: #666;
            margin: 0 0 30px 0;
        }
        
        #name-input { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid var(--teal); 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        #name-input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 10px rgba(122, 111, 255, 0.3);
        }
        
        .btn-start { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            background: var(--teal); 
            color: white;
            font-weight: bold; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .btn-start:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 176, 139, 0.3);
        }

        /* SUBMISSION VIEW */
        #submission-view {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            padding: 20px;
        }
        
        .submission-card {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .submission-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .submission-header h1 {
            color: var(--teal);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        
        .submission-header p {
            color: #666;
            margin: 0;
            font-size: 1rem;
        }
        
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .character-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .character-box:hover {
            transform: translateY(-5px);
            border-color: var(--teal);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .character-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        
        .character-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
            margin: 0;
        }
        
        .character-status {
            font-size: 1.5rem;
            margin-top: 10px;
        }
        
        .photo-preview {
            width: 100%;
            height: 80px;
            background: white;
            border: 2px dashed #ddd;
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 0.8rem;
        }
        
        .photo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        
        .file-input {
            display: none;
        }
        
        .btn-submit {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--teal);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 176, 139, 0.3);
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 176, 139, 0.4);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-back {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #e0e0e0;
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            background: #d0d0d0;
        }
        
        .status-message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.95rem;
            min-height: 30px;
        }
        
        .status-message.success {
            color: var(--teal);
        }
        
        .status-message.error {
            color: var(--coral);
        }
        
        .status-message.loading {
            color: var(--purple);
        }

        @media (max-width: 768px) {
            .name-modal { padding: 30px; }
            .characters-grid { grid-template-columns: 1fr; }
            .submission-card { padding: 25px; }
            .submission-header h1 { font-size: 1.5rem; }
            .character-emoji { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<!-- NAME INPUT SCREEN -->
<div id="name-input-screen">
    <div class="name-modal">
        <h1>👋 Character Activity</h1>
        <p>Enter your name to begin</p>
        
        <input type="text" id="name-input" placeholder="Your name..." autocomplete="off">
        <button class="btn-start" onclick="startActivity()">Start →</button>
    </div>
</div>

<!-- SUBMISSION VIEW -->
<div id="submission-view" class="hidden">
    <div class="submission-card">
        <div class="submission-header">
            <h1 id="student-name-display">Activity</h1>
            <p>📸 Upload a photo for each character</p>
        </div>
        
        <div class="characters-grid">
            <!-- Elsa -->
            <div class="character-box" onclick="triggerUpload('elsa')">
                <span class="character-emoji">❄️</span>
                <p class="character-name">Elsa</p>
                <div id="elsa-preview" class="photo-preview">
                    <span>Click to upload</span>
                </div>
                <div class="character-status" id="elsa-status">⭕</div>
                <input type="file" id="elsa-input" class="file-input" accept="image/*" onchange="handleUpload('elsa')">
            </div>
            
            <!-- Dory -->
            <div class="character-box" onclick="triggerUpload('dory')">
                <span class="character-emoji">🐠</span>
                <p class="character-name">Dory</p>
                <div id="dory-preview" class="photo-preview">
                    <span>Click to upload</span>
                </div>
                <div class="character-status" id="dory-status">⭕</div>
                <input type="file" id="dory-input" class="file-input" accept="image/*" onchange="handleUpload('dory')">
            </div>
            
            <!-- Judy -->
            <div class="character-box" onclick="triggerUpload('judy')">
                <span class="character-emoji">🦌</span>
                <p class="character-name">Judy</p>
                <div id="judy-preview" class="photo-preview">
                    <span>Click to upload</span>
                </div>
                <div class="character-status" id="judy-status">⭕</div>
                <input type="file" id="judy-input" class="file-input" accept="image/*" onchange="handleUpload('judy')">
            </div>
        </div>
        
        <button id="submit-btn" class="btn-submit" onclick="submitActivity()">📤 Submit</button>
        <button class="btn-back" onclick="backToStart()">← Change Name</button>
        
        <div id="status-msg" class="status-message"></div>
    </div>
</div>

<script>
    let studentData = {
        studentName: '',
        uploads: {
            elsa: null,
            dory: null,
            judy: null
        }
    };

    // Allow Enter key to start
    document.getElementById('name-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            startActivity();
        }
    });

    function startActivity() {
        const name = document.getElementById('name-input').value.trim();
        
        if (!name) {
            alert("Please enter your name!");
            return;
        }
        
        studentData.studentName = name;
        studentData.uploads = { elsa: null, dory: null, judy: null };
        
        document.getElementById('student-name-display').innerText = name;
        document.getElementById('name-input-screen').classList.add('hidden');
        document.getElementById('submission-view').classList.remove('hidden');
        document.getElementById('status-msg').innerText = '';
        
        // Reset UI
        ['elsa', 'dory', 'judy'].forEach(char => {
            document.getElementById(char + '-preview').innerHTML = '<span>Click to upload</span>';
            document.getElementById(char + '-status').innerText = '⭕';
            document.getElementById(char + '-input').value = '';
        });
    }

    function triggerUpload(character) {
        document.getElementById(character + '-input').click();
    }

    function handleUpload(character) {
        const input = document.getElementById(character + '-input');
        const file = input.files[0];
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                studentData.uploads[character] = e.target.result;
                
                // Show preview
                const preview = document.getElementById(character + '-preview');
                preview.innerHTML = `<img src="${e.target.result}" alt="${character}">`;
                
                // Update status
                document.getElementById(character + '-status').innerText = '✅';
            };
            reader.readAsDataURL(file);
        }
    }

    function backToStart() {
        document.getElementById('submission-view').classList.add('hidden');
        document.getElementById('name-input-screen').classList.remove('hidden');
        document.getElementById('name-input').value = '';
        document.getElementById('name-input').focus();
    }

    async function submitActivity() {
        // Validate
        if (!studentData.uploads.elsa || !studentData.uploads.dory || !studentData.uploads.judy) {
            showStatus('❌ Upload photos for all three characters!', 'error');
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = '⏳ Submitting...';
        
        showStatus('📤 Uploading...', 'loading');

        try {
            // Prepare submission data
            const submissionData = {
                studentName: studentData.studentName,
                timestamp: new Date().toLocaleString(),
                elsa: studentData.uploads.elsa,
                dory: studentData.uploads.dory,
                judy: studentData.uploads.judy
            };

            // Send to server
            const response = await fetch('/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(submissionData)
            });

            if (response.ok) {
                showStatus('✅ Submitted! Great job!', 'success');
                btn.innerText = '✅ Done!';
                
                setTimeout(() => {
                    location.reload();
                }, 2000);
            } else {
                showStatus('⚠️ Check with your teacher!', 'success');
                btn.innerText = '📤 Submit';
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Error:', error);
            showStatus('⚠️ Check with your teacher!', 'success');
            btn.innerText = '📤 Submit';
            btn.disabled = false;
        }
    }

    function showStatus(msg, type) {
        const statusEl = document.getElementById('status-msg');
        statusEl.innerText = msg;
        statusEl.className = 'status-message ' + type;
    }

    // Auto-focus on name input
    window.onload = () => {
        document.getElementById('name-input').focus();
    };
</script>

</body>
</html>
