<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Activity</title>
    <style>
        :root { 
            --teal: #00b08b; 
            --coral: #ff7e79; 
            --purple: #7a6fff; 
            --white: #ffffff; 
        }
        
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #b0b0b0; 
            overflow: hidden; 
        }
        
        .hidden { display: none !important; }

        /* NAME INPUT SCREEN */
        #name-input-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        
        .name-modal { 
            background: white; 
            padding: 50px; 
            border-radius: 30px; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            text-align: center;
        }
        
        .name-modal h1 {
            color: var(--teal);
            margin-top: 0;
            font-size: 2rem;
        }
        
        .name-modal p {
            color: #666;
            margin: 0 0 30px 0;
        }
        
        #name-input { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid var(--teal); 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        #name-input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 10px rgba(122, 111, 255, 0.3);
        }
        
        .btn-start { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            background: var(--teal); 
            color: white;
            font-weight: bold; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .btn-start:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 176, 139, 0.3);
        }

        /* STAGE SELECTION */
        #stage-select-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .stage-modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .stage-modal h1 {
            color: var(--teal);
            margin-top: 0;
            font-size: 2rem;
        }

        .stage-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stage-btn {
            padding: 25px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .stage-btn-photo {
            background: var(--teal);
            color: white;
        }

        .stage-btn-photo:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 176, 139, 0.4);
        }

        .stage-btn-voice {
            background: var(--coral);
            color: white;
        }

        .stage-btn-voice:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 126, 121, 0.4);
        }

        .stage-emoji {
            font-size: 2rem;
        }

        /* PHOTO STAGE */
        #photo-stage {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            padding: 20px;
        }
        
        .photo-card {
            background: white;
            width: 90%;
            max-width: 700px;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .photo-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .photo-header h1 {
            color: var(--teal);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        
        .photo-header p {
            color: #666;
            margin: 0;
            font-size: 1rem;
        }
        
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .character-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .character-box:hover {
            transform: translateY(-5px);
            border-color: var(--teal);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .character-emoji {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }
        
        .character-name {
            font-weight: bold;
            font-size: 0.9rem;
            color: #333;
            margin: 0;
        }
        
        .character-status {
            font-size: 1.2rem;
            margin-top: 8px;
        }
        
        .photo-preview {
            width: 100%;
            height: 70px;
            background: white;
            border: 2px dashed #ddd;
            border-radius: 8px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 0.7rem;
        }
        
        .photo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        
        .file-input {
            display: none;
        }

        /* VOICE STAGE */
        #voice-stage {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            padding: 20px;
        }

        .voice-card {
            background: white;
            width: 90%;
            max-width: 700px;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .voice-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .voice-header h1 {
            color: var(--coral);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .voice-header p {
            color: #666;
            margin: 0;
            font-size: 1rem;
        }

        .voice-characters {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .voice-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .voice-item:hover {
            border-color: var(--coral);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .voice-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .voice-emoji {
            font-size: 2.5rem;
        }

        .voice-info h3 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .voice-line {
            margin: 0;
            color: #666;
            font-style: italic;
            font-size: 0.95rem;
        }

        .record-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--coral);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 126, 121, 0.3);
        }

        .record-btn.recording {
            background: #ff5252;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .record-btn.recorded {
            background: var(--teal);
        }

        .voice-status {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--teal);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 176, 139, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 176, 139, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #e0e0e0;
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        .status-message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.95rem;
            min-height: 30px;
        }

        .status-message.success {
            color: var(--teal);
        }

        .status-message.error {
            color: var(--coral);
        }

        .status-message.loading {
            color: var(--purple);
        }

        @media (max-width: 768px) {
            .name-modal { padding: 30px; }
            .characters-grid { grid-template-columns: repeat(2, 1fr); }
            .photo-card { padding: 25px; }
            .photo-header h1 { font-size: 1.5rem; }
            .character-emoji { font-size: 2rem; }
            .stage-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- NAME INPUT SCREEN -->
<div id="name-input-screen">
    <div class="name-modal">
        <h1>🎭 Character Activity</h1>
        <p>Enter your name to begin</p>
        
        <input type="text" id="name-input" placeholder="Your name..." autocomplete="off">
        <button class="btn-start" onclick="startActivity()">Start →</button>
    </div>
</div>

<!-- STAGE SELECTION -->
<div id="stage-select-screen" class="hidden">
    <div class="stage-modal">
        <h1>Choose a Stage</h1>
        <p>What would you like to do?</p>
        
        <div class="stage-buttons">
            <button class="stage-btn stage-btn-photo" onclick="goToPhotoStage()">
                <span class="stage-emoji">📸</span>
                <span>Stage 1: Upload Photos</span>
            </button>
            <button class="stage-btn stage-btn-voice" onclick="goToVoiceStage()">
                <span class="stage-emoji">🎤</span>
                <span>Stage 2: Record Voices</span>
            </button>
        </div>
    </div>
</div>

<!-- PHOTO STAGE -->
<div id="photo-stage" class="hidden">
    <div class="photo-card">
        <div class="photo-header">
            <h1 id="photo-student-name">Activity</h1>
            <p>📸 Stage 1: Upload a photo for each character</p>
        </div>
        
        <div class="characters-grid" id="photo-grid"></div>
        
        <button class="submit-btn" onclick="submitPhotos()">✓ Done with Photos</button>
        <button class="btn-back" onclick="backToStageSelect()">← Back</button>
        
        <div id="photo-status" class="status-message"></div>
    </div>
</div>

<!-- VOICE STAGE -->
<div id="voice-stage" class="hidden">
    <div class="voice-card">
        <div class="voice-header">
            <h1 id="voice-student-name">Activity</h1>
            <p>🎤 Stage 2: Record each character's line</p>
        </div>
        
        <div class="voice-characters" id="voice-grid"></div>
        
        <button class="submit-btn" onclick="submitVoices()">🚀 Submit All</button>
        <button class="btn-back" onclick="backToStageSelect()">← Back</button>
        
        <div id="voice-status" class="status-message"></div>
    </div>
</div>

<script>
    // Character data
    const CHARACTERS = [
        { emoji: '❄️', name: 'Elsa', line: 'Let it go' },
        { emoji: '🐠', name: 'Dory', line: 'Just keep swimming' },
        { emoji: '🦌', name: 'Judy', line: 'Change starts with you' },
        { emoji: '👑', name: 'Mufasa', line: 'You are more than what you have become' },
        { emoji: '👵', name: 'Ellie', line: 'Adventure is out there' },
        { emoji: '👗', name: 'Cinderella', line: 'Even miracles take time' },
        { emoji: '🎭', name: 'Peter Pan', line: 'All it takes is faith and trust' },
        { emoji: '👨‍🍳', name: 'Chef', line: 'Your only limit is your soul' }
    ];

    // Google Apps Script URL - REPLACE THIS
    const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID_HERE/exec";

    let studentData = {
        studentName: '',
        photoUploads: {},
        voiceRecordings: {},
        mediaRecorder: null,
        audioChunks: [],
        isRecording: false
    };

    // Initialize character data
    CHARACTERS.forEach(char => {
        studentData.photoUploads[char.name] = null;
        studentData.voiceRecordings[char.name] = null;
    });

    // Allow Enter key to start
    document.getElementById('name-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            startActivity();
        }
    });

    function startActivity() {
        const name = document.getElementById('name-input').value.trim();
        
        if (!name) {
            alert("Please enter your name!");
            return;
        }
        
        studentData.studentName = name;
        document.getElementById('name-input-screen').classList.add('hidden');
        document.getElementById('stage-select-screen').classList.remove('hidden');
    }

    function goToPhotoStage() {
        document.getElementById('stage-select-screen').classList.add('hidden');
        document.getElementById('photo-stage').classList.remove('hidden');
        document.getElementById('photo-student-name').innerText = studentData.studentName;
        buildPhotoGrid();
    }

    function goToVoiceStage() {
        document.getElementById('stage-select-screen').classList.add('hidden');
        document.getElementById('voice-stage').classList.remove('hidden');
        document.getElementById('voice-student-name').innerText = studentData.studentName;
        buildVoiceGrid();
    }

    function buildPhotoGrid() {
        const grid = document.getElementById('photo-grid');
        grid.innerHTML = '';
        
        CHARACTERS.forEach((char, idx) => {
            const box = document.createElement('div');
            box.className = 'character-box';
            box.onclick = () => triggerPhotoUpload(char.name);
            box.innerHTML = `
                <span class="character-emoji">${char.emoji}</span>
                <p class="character-name">${char.name}</p>
                <div id="photo-${char.name}-preview" class="photo-preview">
                    <span>Click</span>
                </div>
                <div class="character-status" id="photo-${char.name}-status">⭕</div>
                <input type="file" id="photo-input-${char.name}" class="file-input" accept="image/*" 
                    onchange="handlePhotoUpload('${char.name}')">
            `;
            grid.appendChild(box);
        });
    }

    function triggerPhotoUpload(characterName) {
        document.getElementById(`photo-input-${characterName}`).click();
    }

    function handlePhotoUpload(characterName) {
        const input = document.getElementById(`photo-input-${characterName}`);
        const file = input.files[0];
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                studentData.photoUploads[characterName] = e.target.result;
                
                const preview = document.getElementById(`photo-${characterName}-preview`);
                preview.innerHTML = `<img src="${e.target.result}" alt="${characterName}">`;
                
                document.getElementById(`photo-${characterName}-status`).innerText = '✅';
            };
            reader.readAsDataURL(file);
        }
    }

    function buildVoiceGrid() {
        const grid = document.getElementById('voice-grid');
        grid.innerHTML = '';
        
        CHARACTERS.forEach((char, idx) => {
            const item = document.createElement('div');
            item.className = 'voice-item';
            item.innerHTML = `
                <div class="voice-top">
                    <span class="voice-emoji">${char.emoji}</span>
                    <div class="voice-info">
                        <h3>${char.name}</h3>
                        <p class="voice-line">"${char.line}"</p>
                    </div>
                </div>
                <button class="record-btn" id="record-${char.name}" onclick="toggleRecording('${char.name}')">
                    🎤 Record
                </button>
                <div class="character-status" id="voice-${char.name}-status">⭕</div>
                <input type="hidden" id="voice-input-${char.name}">
            `;
            grid.appendChild(item);
        });
    }

    async function toggleRecording(characterName) {
        const btn = document.getElementById(`record-${characterName}`);
        
        if (!studentData.isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                studentData.mediaRecorder = new MediaRecorder(stream);
                studentData.audioChunks = [];
                
                studentData.mediaRecorder.ondataavailable = e => studentData.audioChunks.push(e.data);
                studentData.mediaRecorder.onstop = () => {
                    const blob = new Blob(studentData.audioChunks, { type: 'audio/wav' });
                    studentData.voiceRecordings[characterName] = blob;
                    
                    btn.innerText = '✅ Recorded';
                    btn.classList.add('recorded');
                    document.getElementById(`voice-${characterName}-status`).innerText = '✅';
                };
                
                studentData.mediaRecorder.start();
                studentData.isRecording = true;
                btn.innerText = '⏹️ Stop';
                btn.classList.add('recording');
            } catch (e) {
                alert("Microphone access needed! Check your settings.");
            }
        } else {
            studentData.mediaRecorder.stop();
            studentData.isRecording = false;
        }
    }

    function submitPhotos() {
        const allUploaded = CHARACTERS.every(char => studentData.photoUploads[char.name] !== null);
        
        if (!allUploaded) {
            showPhotoStatus('❌ Upload photos for all characters!', 'error');
            return;
        }
        
        backToStageSelect();
    }

    async function submitVoices() {
        const allRecorded = CHARACTERS.every(char => studentData.voiceRecordings[char.name] !== null);
        
        if (!allRecorded) {
            showVoiceStatus('❌ Record all characters!', 'error');
            return;
        }

        const btn = document.querySelector('#voice-stage .submit-btn');
        btn.disabled = true;
        btn.innerText = '⏳ Submitting...';
        
        showVoiceStatus('📤 Uploading...', 'loading');

        try {
            // Prepare all data
            const photoPromises = CHARACTERS.map(char => 
                new Promise(resolve => {
                    if (studentData.photoUploads[char.name]) {
                        resolve({ character: char.name, data: studentData.photoUploads[char.name] });
                    } else {
                        resolve(null);
                    }
                })
            );

            const voicePromises = CHARACTERS.map(char =>
                new Promise(resolve => {
                    if (studentData.voiceRecordings[char.name]) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            resolve({ character: char.name, data: reader.result });
                        };
                        reader.readAsDataURL(studentData.voiceRecordings[char.name]);
                    } else {
                        resolve(null);
                    }
                })
            );

            const photos = await Promise.all(photoPromises);
            const voices = await Promise.all(voicePromises);

            const submissionData = {
                studentName: studentData.studentName,
                timestamp: new Date().toLocaleString(),
                photos: photos.filter(p => p),
                voices: voices.filter(v => v)
            };

            // Send to Google Apps Script
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: 'no-cors',
                body: JSON.stringify(submissionData)
            });

            showVoiceStatus('✅ Submitted! Great job!', 'success');
            btn.innerText = '✅ Done!';
            
            setTimeout(() => {
                location.reload();
            }, 2000);
        } catch (error) {
            console.error('Error:', error);
            showVoiceStatus('⚠️ Check with your teacher!', 'success');
            btn.innerText = '🚀 Submit All';
            btn.disabled = false;
        }
    }

    function backToStageSelect() {
        document.getElementById('photo-stage').classList.add('hidden');
        document.getElementById('voice-stage').classList.add('hidden');
        document.getElementById('stage-select-screen').classList.remove('hidden');
    }

    function showPhotoStatus(msg, type) {
        const statusEl = document.getElementById('photo-status');
        statusEl.innerText = msg;
        statusEl.className = 'status-message ' + type;
    }

    function showVoiceStatus(msg, type) {
        const statusEl = document.getElementById('voice-status');
        statusEl.innerText = msg;
        statusEl.className = 'status-message ' + type;
    }

    window.onload = () => {
        document.getElementById('name-input').focus();
    };
</script>

</body>
</html>
